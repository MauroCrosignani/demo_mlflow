services:
  mlflow_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlflow_server
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
      - ./mlflow.db:/mlflow
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  model_r:
    build:
      context: .
      dockerfile: Dockerfile.R
    container_name: model_r
    restart: always
    depends_on:
      mlflow_server:
        condition: service_healthy
    environment:
      MODEL_R_HOST: 0.0.0.0
      MODEL_R_PORT: 8001
    ports:
      - "8001:8001"
    volumes:
      - ./mlruns:/app/mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  model_python:
    build:
      context: .
      dockerfile: Dockerfile.Py
    container_name: model_python
    restart: always
    depends_on:
      mlflow_server:
        condition: service_healthy
    ports:
      - "8002:8002"
    volumes:
      - ./mlruns:/app/mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
